[pytest]
testpaths = .
python_files = test_all.py
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    basic: 基本命令 (SET, GET, MSET, MGET, EXISTS, DEL)
    expire: 过期命令 (EXPIRE, TTL, EXPIRETIME)
    list: 列表命令 (LPUSH, RPOP, LRANGE 等)
    hash: 哈希命令 (HSET, HGET, HDEL 等)
    set: 集合命令 (SADD, SCARD, SMEMBERS 等)
    zset: 有序集合命令 (ZADD, ZCARD, ZRANK 等)
    transaction: 事务命令 (MULTI, EXEC, DISCARD, WATCH)
