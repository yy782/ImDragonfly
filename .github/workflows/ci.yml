name: CI

on:
  push:
    branches: [main, 更好的io_uring_proactor]
  pull_request:
    branches: [main, 更好的io_uring_proactor]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    env:
      CC: clang
      CXX: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 安装系统依赖 ──────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            cmake \
            make \
            ninja-build \
            liburing-dev \
            libmimalloc-dev \
            libboost-dev \
            libgoogle-glog-dev \
            libabsl-dev \
            libprotobuf-dev \
            protobuf-compiler \
            libgtest-dev \
            googletest \
            python3 \
            python3-pip

      # ── 编译 GTest（Ubuntu 自带源码，需手动编译）─────────
      - name: Build GTest from source
        run: |
          cd /usr/src/googletest
          sudo cmake -DCMAKE_BUILD_TYPE=Release .
          sudo make -j$(nproc)
          sudo cmake --install . --prefix /usr/local

      # ── CMake 配置 ───────────────────────────────────────
      - name: Configure CMake
        run: |
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON \
            -S . -B build

      # ── 编译 ─────────────────────────────────────────────
      - name: Build
        run: cmake --build build --target imdragonfly db_table_test -j$(nproc)

      # ── C++ 单元测试 (db_table_test) ─────────────────────
      - name: Run db_table_test
        run: |
          mkdir -p test-results
          ./build/test/db_table_test --gtest_output=xml:test-results/db_table_test.xml

      # ── 启动 ImDragonfly 服务 ────────────────────────────
      - name: Start ImDragonfly
        run: |
          mkdir -p ./logs
          ./build/imdragonfly 4 &
          # 等待服务就绪
          for i in $(seq 1 30); do
            if python3 -c "import socket; s=socket.socket(); s.settimeout(1); s.connect(('127.0.0.1', 6379)); s.close()" 2>/dev/null; then
              echo "ImDragonfly is ready"
              break
            fi
            echo "Waiting for ImDragonfly... ($i)"
            sleep 1
          done

      # ── Python 集成测试 (redis-py) ───────────────────────
      - name: Install Python test dependencies
        run: |
          python3 -m venv /tmp/venv
          /tmp/venv/bin/pip install redis pytest

      - name: Run Python tests
        run: |
          cd test/redis-py
          /tmp/venv/bin/python -m pytest test_all.py -v \
            --redis-host=127.0.0.1 --redis-port=6379
